{% extends "admin/base_admin.html" %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
        <i class="fas fa-images text-2xl" style="color: var(--primary);"></i>
        {{ _('add_new') if not slide else _('edit') }} Hero Slide
    </h1>
</div>

<div class="admin-card p-6">
    <form method="POST" enctype="multipart/form-data">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Kolom Kiri -->
            <div class="space-y-5">
                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-image text-xs" style="color: var(--primary);"></i>
                        {{ _('image') }} <span class="text-red-500">*</span>
                    </label>
                    <div class="flex items-center gap-4">
                        {% if slide and slide.image_filename %}
                        <div class="flex-shrink-0">
                            <img src="{{ url_for('uploaded_hero_file', filename=slide.image_filename) }}"
                                 alt="Current"
                                 class="h-16 w-24 object-cover rounded-lg border-2 border-gray-200">
                        </div>
                        {% endif %}
                        <div class="flex-1">
                            <input type="file" name="image" accept="image/*" {% if not slide %}required{% endif %}
                                   class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[var(--primary)] file:text-white hover:file:bg-[var(--primary-dark)] transition">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-heading text-xs" style="color: var(--primary);"></i>
                        {{ _('title') }}
                    </label>
                    <input type="text" name="title" value="{{ slide.title if slide else '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-subscript text-xs" style="color: var(--primary);"></i>
                        {{ _('subtitle') }}
                    </label>
                    <input type="text" name="subtitle" value="{{ slide.subtitle if slide else '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">
                </div>
            </div>

            <!-- Kolom Kanan -->
            <div class="space-y-5">
                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-rectangle-ad text-xs" style="color: var(--primary);"></i>
                        {{ _('button_text') }}
                    </label>
                    <input type="text" name="button_text" value="{{ slide.button_text if slide else '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-link text-xs" style="color: var(--primary);"></i>
                        {{ _('button_url') }}
                    </label>
                    <input type="url" name="button_url" value="{{ slide.button_url if slide else '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition"
                           placeholder="https://...">
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-sort-numeric-down text-xs" style="color: var(--primary);"></i>
                        {{ _('order') }}
                    </label>
                    <input type="number" name="order" value="{{ slide.order if slide else 0 }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">
                </div>

                <div class="flex items-center pt-2">
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <input type="checkbox" name="is_active" {% if not slide or slide.is_active %}checked{% endif %}
                               class="w-4 h-4 rounded border-gray-300 text-[var(--primary)] focus:ring-[var(--primary)] transition">
                        <i class="fas fa-toggle-on text-xs" style="color: var(--primary);"></i>
                        {{ _('active') }}
                    </label>
                </div>
            </div>
        </div>

        <!-- Tombol Aksi -->
        <div class="flex items-center gap-4 mt-8 pt-6 border-t border-gray-200">
            <button type="submit" class="inline-flex items-center gap-2 btn-primary">
                <i class="fas fa-save"></i> {{ _('save') }}
            </button>
            <a href="{{ url_for('admin_hero') }}"
               class="inline-flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-800 py-2 px-6 rounded-lg transition">
                <i class="fas fa-times"></i> {{ _('cancel') }}
            </a>
        </div>
    </form>
</div>
{% endblock %}
