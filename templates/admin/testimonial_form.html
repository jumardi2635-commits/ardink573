{% extends "admin/base_admin.html" %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
        <i class="fas fa-comment-dots text-2xl" style="color: var(--primary);"></i>
        {{ 'Tambah' if not testimonial else 'Edit' }} Testimonial
    </h1>
</div>

<div class="admin-card p-6">
    <form method="POST" enctype="multipart/form-data">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Left column -->
            <div class="space-y-5">
                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-user text-xs" style="color: var(--primary);"></i>
                        Nama <span class="text-red-500">*</span>
                    </label>
                    <input type="text" name="name" value="{{ testimonial.name if testimonial else '' }}" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-map-marker-alt text-xs" style="color: var(--primary);"></i>
                        Lokasi
                    </label>
                    <input type="text" name="location" value="{{ testimonial.location if testimonial else '' }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-star text-xs" style="color: var(--primary);"></i>
                        Rating
                    </label>
                    <select name="rating"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">
                        <option value="5" {% if testimonial and testimonial.rating == 5 %}selected{% endif %}>5 ⭐</option>
                        <option value="4" {% if testimonial and testimonial.rating == 4 %}selected{% endif %}>4 ⭐</option>
                        <option value="3" {% if testimonial and testimonial.rating == 3 %}selected{% endif %}>3 ⭐</option>
                        <option value="2" {% if testimonial and testimonial.rating == 2 %}selected{% endif %}>2 ⭐</option>
                        <option value="1" {% if testimonial and testimonial.rating == 1 %}selected{% endif %}>1 ⭐</option>
                    </select>
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-image text-xs" style="color: var(--primary);"></i>
                        Gambar Profil
                    </label>
                    <div class="flex items-center gap-4">
                        {% if testimonial and testimonial.image_filename %}
                        <div class="flex-shrink-0">
                            <img src="{{ url_for('uploaded_testimonial_file', filename=testimonial.image_filename) }}"
                                 alt="{{ testimonial.name }}"
                                 class="h-16 w-16 rounded-full object-cover border-2 border-gray-200">
                        </div>
                        {% endif %}
                        <div class="flex-1">
                            <input type="file" name="image" accept="image/*"
                                   class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[var(--primary)] file:text-white hover:file:bg-[var(--primary-dark)] transition">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right column -->
            <div class="space-y-5">
                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-quote-right text-xs" style="color: var(--primary);"></i>
                        Teks Testimonial <span class="text-red-500">*</span>
                    </label>
                    <textarea name="text" rows="5" required
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">{{ testimonial.text if testimonial else '' }}</textarea>
                </div>

                <div>
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700 mb-1">
                        <i class="fas fa-sort-numeric-down text-xs" style="color: var(--primary);"></i>
                        Urutan
                    </label>
                    <input type="number" name="order" value="{{ testimonial.order if testimonial else 0 }}"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition">
                </div>

                <div class="flex items-center pt-2">
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <input type="checkbox" name="is_active" {% if not testimonial or testimonial.is_active %}checked{% endif %}
                               class="w-4 h-4 rounded border-gray-300 text-[var(--primary)] focus:ring-[var(--primary)] transition">
                        <i class="fas fa-toggle-on text-xs" style="color: var(--primary);"></i>
                        Aktif
                    </label>
                </div>
            </div>
        </div>

        <!-- Form actions -->
        <div class="flex items-center gap-4 mt-8 pt-6 border-t border-gray-200">
            <button type="submit" class="inline-flex items-center gap-2 btn-primary">
                <i class="fas fa-save"></i> Simpan
            </button>
            <a href="{{ url_for('admin_testimonials') }}"
               class="inline-flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-800 py-2 px-6 rounded-lg transition">
                <i class="fas fa-times"></i> Batal
            </a>
        </div>
    </form>
</div>
{% endblock %}
